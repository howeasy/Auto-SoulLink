name: Release

on:
  release:
    types: [published]

jobs:
  build-player-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build player package
        run: python tools/make_release.py --version "${{ steps.version.outputs.version }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "dist/SLink-player-${{ steps.version.outputs.version }}.zip" \
            --clobber
